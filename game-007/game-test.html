<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forgotten Temple - Interactive Fiction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- Status Bar -->
        <div id="status-bar">
            <div id="room-name">Unknown</div>
            <div id="inventory-info">Items: 0</div>
        </div>

        <!-- Text Display Area -->
        <div id="text-display">
            <div id="text-buffer"></div>
        </div>

        <!-- Input Line -->
        <div id="input-line">
            <span class="prompt">&gt;</span>
            <input type="text" id="command-input" autocomplete="off" spellcheck="false">
        </div>
    </div>
    
    <!-- Load game (ES6 modules) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
