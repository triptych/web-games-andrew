<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000000;
            color: #00FF00;
            margin: 0;
            padding: 20px;
        }
        #test-box {
            width: 900px;
            height: 600px;
            margin: 20px auto;
            border: 2px solid #00FF00;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="test-box">
        <h1>Test Page</h1>
        <p>If you can see this, the basic HTML/CSS is working.</p>
        <p id="js-test">JavaScript NOT loaded</p>
    </div>
    
    <script>
        document.getElementById('js-test').textContent = 'JavaScript IS loaded!';
        console.log('Test page loaded successfully');
    </script>
</body>
</html>
