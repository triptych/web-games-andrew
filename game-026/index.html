<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crypt of the Forgotten</title>
    <style>
        :root {
            --ui-scale: 1;
            --gutter: 12px;
            --gold:   #ffd700;
            --accent: #64c8ff;
            --danger: #ff5050;
            --text:   #dcdcf0;
            --panel-bg: rgba(10,10,20,0.72);
            --panel-border: rgba(180,150,60,0.55);
            --panel-inset: rgba(255,215,0,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: var(--text);
        }
        canvas { display: block; }

        /* ── HUD overlay ──────────────────────────────────────────── */
        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* Carved panel base */
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: inset 0 0 0 1px var(--panel-inset);
            border-radius: 2px;
        }

        /* ── TOP BAR ───────────────────────────────────────────────── */
        #top-bar {
            position: absolute;
            top: var(--gutter);
            left: var(--gutter);
            right: var(--gutter);
            height: 42px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 0;
        }

        /* HP section */
        #hp-section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        #hp-label {
            font-size: calc(11px * var(--ui-scale));
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            white-space: nowrap;
        }
        #hp-nums {
            font-size: calc(13px * var(--ui-scale));
            letter-spacing: 1px;
            white-space: nowrap;
            min-width: 52px;
            transition: color 0.3s;
        }
        #hp-bar-wrap {
            width: 100px;
            height: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1px;
            overflow: hidden;
        }
        #hp-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #50dc64, #80ff96);
            transform-origin: left;
            transition: transform 0.35s ease, background 0.35s;
        }
        #hp-bar-fill.low {
            background: linear-gradient(90deg, #ff5050, #ff8080);
            animation: hp-pulse 1.2s ease-in-out infinite;
        }
        @keyframes hp-pulse {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.55; }
        }

        /* Depth section */
        #depth-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        #depth-label {
            font-size: calc(10px * var(--ui-scale));
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.55;
        }
        #depth-val {
            font-size: calc(18px * var(--ui-scale));
            letter-spacing: 2px;
            color: var(--gold);
            transition: transform 0.25s ease;
        }
        #depth-val.pop {
            animation: depth-pop 0.4s ease;
        }
        @keyframes depth-pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        /* Score section */
        #score-section {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        #score-label {
            font-size: calc(11px * var(--ui-scale));
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        #score-val {
            font-size: calc(15px * var(--ui-scale));
            letter-spacing: 1px;
            color: var(--gold);
        }
        #score-val.flash {
            animation: score-flash 0.5s ease;
        }
        @keyframes score-flash {
            0%,100% { color: var(--gold); }
            40%     { color: #fff; text-shadow: 0 0 12px var(--gold); }
        }

        /* ── RIGHT RAIL — minimap ──────────────────────────────────── */
        #minimap-wrap {
            position: absolute;
            top: var(--gutter);
            right: var(--gutter);
            /* shifted down to not overlap top bar */
            top: calc(var(--gutter) + 54px);
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #minimap-label {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.45;
        }
        #minimap-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #minimap-wrap.hidden { display: none; }

        /* Automap full-screen overlay */
        #automap-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        #automap-overlay.hidden { display: none; }
        #automap-label {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.7;
        }
        #automap-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 1px solid var(--panel-border);
        }

        /* ── COMPASS ───────────────────────────────────────────────── */
        #compass {
            position: absolute;
            bottom: calc(var(--gutter) + 52px);
            right: calc(var(--gutter) + 8px);
            font-size: calc(14px * var(--ui-scale));
            letter-spacing: 2px;
            color: var(--accent);
            text-align: center;
        }
        #compass-dir {
            font-size: calc(20px * var(--ui-scale));
            font-weight: bold;
            color: var(--gold);
        }

        /* ── LEFT RAIL — weapon chip ───────────────────────────────── */
        #weapon-chip {
            position: absolute;
            bottom: calc(var(--gutter) + 52px);
            left: var(--gutter);
            padding: 8px 12px;
            min-width: 72px;
            text-align: center;
        }
        #weapon-chip-label {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 3px;
        }
        #weapon-chip-name {
            font-size: calc(12px * var(--ui-scale));
            letter-spacing: 1px;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* ── BOTTOM ACTION HINT BAR ────────────────────────────────── */
        #bottom-bar {
            position: absolute;
            bottom: var(--gutter);
            left: var(--gutter);
            right: var(--gutter);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
            gap: 18px;
            font-size: calc(11px * var(--ui-scale));
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.65;
        }
        #bottom-bar span { white-space: nowrap; }
        #hint-search {
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        #hint-search.visible { opacity: 1; }

        /* ── MESSAGE LOG ───────────────────────────────────────────── */
        #message-log {
            position: absolute;
            bottom: calc(var(--gutter) + 50px);
            left: calc(var(--gutter) + 90px);
            width: 340px;
            display: flex;
            flex-direction: column-reverse;
            gap: 3px;
            pointer-events: none;
        }
        .log-entry {
            font-size: calc(12px * var(--ui-scale));
            letter-spacing: 1px;
            color: var(--text);
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .log-entry.show { opacity: 0.85; }

        /* ── SPLASH / GAMEOVER / MESSAGE OVERLAY ───────────────────── */
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #message h1 {
            font-size: 52px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: var(--accent);
        }
        #message p { font-size: 16px; margin-top: 6px; letter-spacing: 2px; }

        /* ── DAMAGE VIGNETTE ───────────────────────────────────────── */
        #vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                transparent 55%,
                rgba(255,60,60,0) 70%,
                rgba(255,60,60,0.0) 100%);
            transition: background 0.1s;
        }
        #vignette.flash {
            animation: vignette-flash 0.5s ease-out forwards;
        }
        @keyframes vignette-flash {
            0%   { background: radial-gradient(ellipse at center,
                        transparent 40%, rgba(255,60,60,0.55) 100%); }
            100% { background: radial-gradient(ellipse at center,
                        transparent 55%, rgba(255,60,60,0.0) 100%); }
        }
        #vignette.low-hp {
            animation: vignette-pulse 2s ease-in-out infinite;
        }
        @keyframes vignette-pulse {
            0%,100% { background: radial-gradient(ellipse at center,
                          transparent 55%, rgba(255,60,60,0.12) 100%); }
            50%     { background: radial-gradient(ellipse at center,
                          transparent 45%, rgba(255,60,60,0.35) 100%); }
        }

        .hidden { display: none !important; }

        /* Reduced-motion overrides */
        @media (prefers-reduced-motion: reduce) {
            #hp-bar-fill.low        { animation: none; opacity: 1; }
            #vignette.flash         { animation: none; }
            #vignette.low-hp        { animation: none; }
            #score-val.flash        { animation: none; color: #fff; }
            #depth-val.pop          { animation: none; }
        }
    </style>
</head>
<body>
    <div id="ui-overlay">

        <!-- Damage vignette (behind other HUD elements) -->
        <div id="vignette"></div>

        <!-- Top bar: HP | DEPTH | SCORE -->
        <div id="top-bar" class="panel">
            <div id="hp-section">
                <span id="hp-label">&#9829; HP</span>
                <span id="hp-nums">20/20</span>
                <div id="hp-bar-wrap">
                    <div id="hp-bar-fill"></div>
                </div>
            </div>
            <div id="depth-section">
                <span id="depth-label">Depth</span>
                <span id="depth-val">1</span>
            </div>
            <div id="score-section">
                <span id="score-label">&#9824; Score</span>
                <span id="score-val">0</span>
            </div>
        </div>

        <!-- Minimap (right rail) -->
        <div id="minimap-wrap" class="panel hidden">
            <div id="minimap-label">Map</div>
            <canvas id="minimap-canvas"></canvas>
        </div>

        <!-- Fullscreen automap overlay -->
        <div id="automap-overlay" class="hidden">
            <div id="automap-label">Automap &mdash; TAB to close</div>
            <canvas id="automap-canvas"></canvas>
        </div>

        <!-- Compass -->
        <div id="compass">
            <div id="compass-dir">N</div>
            <div style="font-size:9px;letter-spacing:2px;opacity:0.5">FACING</div>
        </div>

        <!-- Weapon chip (left rail) -->
        <div id="weapon-chip" class="panel">
            <div id="weapon-chip-label">&#9876; Weapon</div>
            <div id="weapon-chip-name">Fists</div>
        </div>

        <!-- Message log (bottom-left, above action bar) -->
        <div id="message-log">
            <!-- pooled .log-entry divs inserted by ui.js -->
        </div>

        <!-- Bottom action hint bar -->
        <div id="bottom-bar" class="panel">
            <span>&#9650; W Forward</span>
            <span>&#9660; S Back</span>
            <span>&#9668; A Turn</span>
            <span>&#9658; D Turn</span>
            <span>Q/E Strafe</span>
            <span id="hint-search">&#128269; F Search</span>
        </div>

        <!-- Splash / game-over message -->
        <div id="message">
            <h1>Crypt of the Forgotten</h1>
            <p>PRESS ANY KEY OR CLICK TO START</p>
            <p style="opacity:0.6">WASD / Arrows to move &middot; M minimap &middot; Tab automap</p>
        </div>

    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
