<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthwave Breakout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        #crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <canvas id="crt-overlay"></canvas>
    <script type="module" src="js/main.js"></script>
    <script>
    // ── CRT / old colour TV raster effect ──────────────────────────────────
    (function () {
        const canvas = document.getElementById('crt-overlay');
        const ctx    = canvas.getContext('2d');

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let frame = 0;

        function draw() {
            const W = canvas.width;
            const H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            // ── 1. Scanlines ──────────────────────────────────────────────
            // Rolling horizontal scanline band (like a TV refresh bar)
            const rollY = (frame * 1.8) % H;
            const rollGrad = ctx.createLinearGradient(0, rollY, 0, rollY + 80);
            rollGrad.addColorStop(0,   'rgba(255,255,255,0.00)');
            rollGrad.addColorStop(0.4, 'rgba(255,255,255,0.03)');
            rollGrad.addColorStop(1,   'rgba(255,255,255,0.00)');
            ctx.fillStyle = rollGrad;
            ctx.fillRect(0, rollY, W, 80);
            // Wrap-around second copy
            if (rollY + 80 > H) {
                ctx.fillRect(0, rollY - H, W, 80);
            }

            // Static scanline grid
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            for (let y = 0; y < H; y += 3) {
                ctx.fillRect(0, y, W, 1);
            }

            // ── 2. RGB colour fringing (chromatic aberration) ─────────────
            // Slight red shift left, blue shift right — applied as thin
            // semi-transparent bands at edges of the screen
            const caWidth = Math.floor(W * 0.006) + 1;
            const rgbGradL = ctx.createLinearGradient(0, 0, caWidth * 3, 0);
            rgbGradL.addColorStop(0,   'rgba(255,0,0,0.06)');
            rgbGradL.addColorStop(0.5, 'rgba(255,0,0,0.02)');
            rgbGradL.addColorStop(1,   'rgba(255,0,0,0.00)');
            ctx.fillStyle = rgbGradL;
            ctx.fillRect(0, 0, caWidth * 3, H);

            const rgbGradR = ctx.createLinearGradient(W, 0, W - caWidth * 3, 0);
            rgbGradR.addColorStop(0,   'rgba(0,80,255,0.06)');
            rgbGradR.addColorStop(0.5, 'rgba(0,80,255,0.02)');
            rgbGradR.addColorStop(1,   'rgba(0,80,255,0.00)');
            ctx.fillStyle = rgbGradR;
            ctx.fillRect(W - caWidth * 3, 0, caWidth * 3, H);

            // ── 3. Vignette ───────────────────────────────────────────────
            const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
            vig.addColorStop(0, 'rgba(0,0,0,0.00)');
            vig.addColorStop(1, 'rgba(0,0,0,0.55)');
            ctx.fillStyle = vig;
            ctx.fillRect(0, 0, W, H);

            // ── 4. Occasional flicker ─────────────────────────────────────
            if (Math.random() < 0.004) {
                ctx.fillStyle = 'rgba(255,255,255,0.025)';
                ctx.fillRect(0, 0, W, H);
            }

            // ── 5. Horizontal noise lines ─────────────────────────────────
            if (Math.random() < 0.06) {
                const ny = Math.random() * H;
                const nh = 1 + Math.random() * 3;
                ctx.fillStyle = 'rgba(255,200,255,' + (0.04 + Math.random() * 0.06) + ')';
                ctx.fillRect(0, ny, W, nh);
            }

            frame++;
            requestAnimationFrame(draw);
        }

        draw();
    })();
    </script>
</body>
</html>
