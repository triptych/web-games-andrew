<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Vanguard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; }

        /* HUD overlay — drawn over the WebGL canvas */
        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            color: #dcdcf0;
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.8);
        }
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #hud .wave { color: #ff64ff; text-shadow: 0 0 8px rgba(255, 100, 255, 0.8); }
        #message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #message h1 {
            font-size: 64px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: #64c8ff;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.9), 0 0 40px rgba(255, 100, 255, 0.5);
        }
        #message p { font-size: 16px; margin-top: 6px; letter-spacing: 2px; }
        .hidden { display: none !important; }

        /* Pause overlay — a dim wash + centered PAUSED text over the frozen field. */
        #pause {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(6, 6, 15, 0.55);
            color: #64c8ff;
            font-size: 56px;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 24px rgba(100, 200, 255, 0.9);
            pointer-events: none;
        }

        /* Buff toast — brief power-up confirmation just under the HUD. */
        #buffs {
            position: absolute;
            top: 64px; left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            letter-spacing: 4px;
            color: #64ffd2;
            text-shadow: 0 0 14px rgba(100, 255, 210, 0.9);
            pointer-events: none;
        }

        /* Damage flash — a full-screen red wash that fades when the player is hit. */
        #flash {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center,
                rgba(255, 60, 60, 0.25) 0%, rgba(255, 30, 30, 0.85) 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s linear;
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <div id="ui-overlay">
        <div id="hud">
            <div><div>SCORE</div><div id="score-val">0</div></div>
            <div class="wave"><div>WAVE</div><div id="wave-val">1</div></div>
            <div><div>LIVES</div><div id="lives-val">3</div></div>
        </div>
        <div id="buffs" class="hidden"></div>
        <div id="pause" class="hidden">Paused</div>
        <div id="message">
            <h1>Neon Vanguard</h1>
            <p>PRESS ANY KEY OR CLICK TO START</p>
            <p style="opacity:0.6">MOVE: WASD / ARROWS &nbsp;•&nbsp; FIRE: SPACE / MOUSE &nbsp;•&nbsp; PAUSE: P</p>
            <p style="opacity:0.6">COLLECT DROPS: SPREAD &nbsp;•&nbsp; SHIELD &nbsp;•&nbsp; EXTRA LIFE</p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
